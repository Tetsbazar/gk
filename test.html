<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জ্ঞান পরীক্ষা কুইজ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Bengali', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
        }
        .progress {
            height: 8px;
            background: #3498db;
            width: 0%;
            transition: width 0.3s;
        }
        .quiz-body {
            padding: 30px;
        }
        .question-number {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
        }
        .question {
            font-size: 22px;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
        }
        .option:hover {
            background: #f8f9fa;
            border-color: #3498db;
        }
        .option.selected {
            background: #e3f2fd;
            border-color: #2196f3;
        }
        .btn {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-next {
            background: #27ae60;
            color: white;
        }
        .btn-restart {
            background: #3498db;
            color: white;
        }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .correct {
            background: #d4edda;
            color: #155724;
        }
        .wrong {
            background: #f8d7da;
            color: #721c24;
        }
        .explanation {
            margin-top: 15px;
            font-style: italic;
        }
        .result {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }
        .score {
            font-size: 48px;
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>জ্ঞান পরীক্ষা কুইজ (১-২৫)</h1>
        </div>
        <div class="progress" id="progress"></div>
        
        <div class="quiz-body" id="quiz-screen">
            <div class="question-number" id="q-number"></div>
            <div class="question" id="question-text"></div>
            
            <div class="options" id="options"></div>
            
            <div style="text-align: center;">
                <button class="btn btn-next" id="next-btn" onclick="nextQuestion()">পরবর্তী প্রশ্ন →</button>
            </div>
            
            <div class="feedback" id="feedback">
                <h3 id="feedback-text"></h3>
                <div class="explanation" id="explanation"></div>
            </div>
        </div>
        
        <div class="result" id="result-screen">
            <h2>কুইজ সমাপ্ত!</h2>
            <div class="score" id="score"></div>
            <p id="score-text"></p>
            <button class="btn btn-restart" onclick="restartQuiz()">আবার শুরু করুন</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "১. প্যালিওন্টোলজি নিম্নোক্ত কোন বিষয়ের অধ্যয়ন?",
                options: ["(A) উদ্ভিদ এবং প্রাণী জীবাশ্ম", "(B) আগ্নেয়গিরি", "(C) বায়ুমণ্ডল", "(D) শিলা"],
                answer: 0,
                explanation: "প্যালিওন্টোলজি (Paleontology) হলো জীবাশ্ম বিজ্ঞান। এর মাধ্যমে কোটি কোটি বছর আগের ভূগর্ভস্থ উদ্ভিদ ও প্রাণীর জীবাশ্ম বা কঙ্কাল নিয়ে গবেষণা করে পৃথিবীর ইতিহাস জানা যায়।"
            },
            {
                q: "২. নিউটনের প্রথম গতিসূত্রটি পরিচিত হয়েছে—",
                options: ["(A) স্থির নীতি", "(B) আপেক্ষিকতার মূলনীতি", "(C) কার্যকারিতা নীতি", "(D) জড়তার মূলনীতি"],
                answer: 3,
                explanation: "নিউটনের প্রথম গতিসূত্র থেকে আমরা পদার্থের 'জড়তা' (Inertia)-র ধারণা পাই।"
            },
            {
                q: "৩. জালিয়ানওয়ালাবাগের হত্যাকাণ্ড ঘটেছিল—",
                options: ["(A) 28 July, 1914", "(B) 24 July, 1935", "(C) 16 October, 1905", "(D) 13 April, 1919"],
                answer: 3,
                explanation: "১৯১৯ সালের ১৩ই এপ্রিল পাঞ্জাবের অমৃতসরের জালিয়ানওয়ালাবাগে রাওলাট আইনের প্রতিবাদে জড়ো হওয়া নিরস্ত্র ভারতীয়দের ওপর ব্রিটিশ জেনারেল ডায়ারের নির্দেশে ব্রিটিশ সেনা নির্বিচারে গুলি চালায়।"
            },
            {
                q: "৪. ভারতের রাষ্ট্রপতি নির্বাচিত হন—",
                options: ["(A) রাজ্যসভা দ্বারা", "(B) সংসদের সদস্য এবং রাজ্য আইন পরিষদের সদস্যগণ দ্বারা", "(C) লোকসভা দ্বারা", "(D) সংসদের সদস্য দ্বারা"],
                answer: 1,
                explanation: "ভারতের রাষ্ট্রপতি একটি নির্বাচকমণ্ডলী দ্বারা নির্বাচিত হন, যার মধ্যে সংসদের উভয় কক্ষের নির্বাচিত সদস্য এবং রাজ্য বিধানসভাগুলির নির্বাচিত সদস্যবৃন্দ থাকেন।"
            },
            {
                q: "৫. বীরবলের আসল নাম কী ছিল?",
                options: ["(A) মহেশ দাস", "(B) श्याम দাস", "(C) ভগবান দাস", "(D) রাম দাস"],
                answer: 0,

            },
            {
                q: "৬. হীরা শক্ত হওয়ার কারণ—",

                explanation: "হীরকের কেলাস গঠনে প্রতিটি কার্বন পরমাণু তার ৪টি যোজ্যতা ইলেকট্রন দিয়ে অন্য ৪টি কার্বন পরমাণুর সাথে অত্যন্ত শক্তিশালী ত্রিমাত্রিক সমযোজী বন্ধন তৈরি করে।"
            },
            {
                q: "৭. লোকসভায় 'জিরো-আওয়ার'-এর সর্বাধিক সময়কাল হল—",
                options: ["(A) 60 মিনিট", "(B) অনির্দিষ্টকাল", "(C) 30 মিনিট", "(D) 2 ঘণ্টা"],
                answer: 0,
                explanation: "লোকসভার অধিবেশনে প্রশ্নোত্তর পর্ব শেষ হওয়ার ঠিক পরে সময়টিকে 'জিরো আওয়ার' বলা হয়। এর সাধারণ সময়সীমা ১ ঘণ্টা।"
            },
            {
                q: "৮. নিম্নলিখিত বিভাগের কোনটি থেকে ভারত তার জি.ডি.পি.-এর সর্বাধিক অংশ লাভ করে?",
                options: ["(A) নির্মাণক্ষেত্র", "(B) সেবাক্ষেত্র", "(C) কৃষিক্ষেত্র", "(D) উৎপাদনক্ষেত্র"],
                answer: 1,
                explanation: "সেবাক্ষেত্র বা টারশিয়ারি সেক্টর ভারতের জিডিপিতে সবথেকে বেশি অবদান রাখে।"
            },
            {
                q: "৯. প্রাকৃতিক নির্বাচনের আইন যার সাথে সম্পর্কিত—",
                options: ["(A) ডারউইন", "(B) মেন্ডেল", "(C) ডালটন", "(D) জে. বি. এস. হ্যাল্ডেন"],
                answer: 0,
                explanation: "চার্লস ডারউইন তাঁর 'Origin of Species' গ্রন্থে প্রাকৃতিক নির্বাচনবাদ তত্ত্ব প্রকাশ করেন।"
            },
            {
                q: "১০. নিম্নলিখিত কোনটি ডায়াবেটিসে আক্রান্ত ব্যক্তির প্রয়োজন?",
                options: ["(A) পেনিসিলিন", "(B) স্ট্রেপটোমাইসিন", "(C) ইনসুলিন", "(D) স্টেরয়েড"],
                answer: 2,
                explanation: "ইনসুলিন হরমোন ঠিকমতো ক্ষরিত না হলে রক্তে শর্করার মাত্রা বেড়ে যায়।"
            },
            {
                q: "১১. 'গোবর' গ্যাসের প্রধান উপাদান হল—",
                options: ["(A) কার্বন ডাইঅক্সাইড", "(B) মিথেন", "(C) ইথেন", "(D) হাইড্রোজেন"],

            },
            {
                q: "১২. \"Letters from a Father to Daughter\" বইটি লিখেছিলেন—",
                options: ["(A) মহাত্মা গান্ধী", "(B) বি. ভি. প্যাটেল", "(C) জওহরলাল নেহেরু", "(D) এস. রাধাকৃষ্ণন"],
                answer: 2,
                explanation: "জওহরলাল নেহেরু তাঁর কন্যা ইন্দিরা গান্ধীকে লেখা চিঠিগুলো থেকে এই বই তৈরি হয়েছে।"
            },
            {
                q: "১৩. আফ্রিকা ইউরোপ থেকে পৃথক হয়েছে যার মাধ্যমে—",
                options: ["(A) ভূমধ্যসাগর", "(B) লোহিত সাগর", "(C) আটলান্টিক মহাসাগর", "(D) পারস্য উপসাগর"],
                answer: 0,
                explanation: "ভূমধ্যসাগর উত্তরে ইউরোপ এবং দক্ষিণে আফ্রিকাকে আলাদা করেছে।"
            },
            {
                q: "১৪. রাশিয়াতে অনুষ্ঠিত 2018 ফিফা বিশ্বকাপ কোন দেশ জিতেছে?",

            },
            {
                q: "২৩. ঘণ্টায় 36 কিলোমিটার বেগে 100 মিটার দীর্ঘ একটি ট্রেন একটি telegraph পোস্টকে কত সেকেন্ডে অতিক্রম করবে?",
                options: ["(A) 12 সেকেন্ড", "(B) 18 সেকেন্ড", "(C) 10 সেকেন্ড", "(D) 15 সেকেন্ড"],
                answer: 2,
                explanation: "১০ মি/সেকেন্ড বেগে ১০০ মিটার অতিক্রম করতে ১০ সেকেন্ড লাগবে।"
            },
            {
                q: "২৪. 'A' একটি কাজ 12 দিনে করতে পারে। 'A' এবং 'B' একসঙ্গে ৪ দিনে... 'B' একা কতদিনে?",
                options: ["(A) 18 দিন", "(B) 28 দিন", "(C) 15 দিন", "(D) 24 দিন"],
                answer: 3,
                explanation: "B এর সময় = ২৪ দিন।"
            },
            {
                q: "২৫. দুই অঙ্কবিশিষ্ট একটি সংখ্যার অঙ্কদ্বয়ের সমষ্টি 12 এবং পার্থক্য 6। সংখ্যাটি কত?",
                options: ["(A) 75", "(B) 93", "(C) 60", "(D) 84"],
                answer: 1,
                explanation: "অঙ্ক ৯ ও ৩ → সংখ্যা ৯৩"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('q-number').textContent = `প্রশ্ন ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('question-text').textContent = q.q;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = option;
                div.onclick = () => selectOption(index, div);
                optionsDiv.appendChild(div);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-block';
            selectedAnswer = null;
            updateProgress();
        }

        function selectOption(index, element) {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedAnswer = index;
        }

        function nextQuestion() {
            if (selectedAnswer === null) {
                alert("অনুগ্রহ করে একটি অপশন নির্বাচন করুন!");
                return;
            }
            
            const q = questions[currentQuestion];
            const isCorrect = selectedAnswer === q.answer;
            
            if (isCorrect) score++;
            
            // Show feedback
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            
            document.getElementById('feedback-text').innerHTML = isCorrect ? 
                "✅ সঠিক উত্তর!" : 
                `❌ ভুল। সঠিক উত্তর: ${q.options[q.answer]}`;
            
            document.getElementById('explanation').innerHTML = `<strong>ব্যাখ্যা:</strong><br>${q.explanation}`;
            
            document.getElementById('next-btn').style.display = 'none';
            
            // Auto next after 3 seconds
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 3500);
        }

        function updateProgress() {
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            const resultScreen = document.getElementById('result-screen');
            resultScreen.style.display = 'block';
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('score').textContent = `${score} / ${questions.length}`;
            document.getElementById('score-text').innerHTML = `আপনার স্কোর: <strong>${percentage}%</strong>`;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';
            loadQuestion();
        }

        // Start the quiz
        window.onload = loadQuestion;
    </script>
</body>
</html>
